<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | الأستاذ شريف علي</title>
    <meta name="theme-color" content="#f8fafc">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>

<style>
/* ... (كل الستايلات بتاعتك زي ما هي بالظبط عشان المحافظة على التصميم) ... */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
:root {
    --bg: #f8fafc; --bg2: #ffffff; --card: rgba(255, 255, 255, 0.9);
    --border: rgba(0, 0, 0, 0.08); --g1: #00b578; --g2: #008f5e;
    --g3: #006a45; --glow: rgba(0, 181, 120, 0.15); --muted:#64748b;
    --text: #0f172a; --text2:#334155; --mono: 'DM Mono', monospace; --sans: 'Tajawal', sans-serif;
}
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; cursor: none; }
#cur-dot { position:fixed; width:8px; height:8px; background:var(--g1); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); box-shadow:0 0 12px var(--g1),0 0 30px var(--glow); transition:width .2s,height .2s; }
#cur-ring { position:fixed; width:36px; height:36px; border:1px solid rgba(0,181,120,.4); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); }
#cvs { position:fixed; inset:0; z-index:0; opacity:.8; }
.page { position:relative; z-index:2; min-height:100vh; display:grid; grid-template-rows:auto 1fr auto; }
nav { position:sticky; top:0; z-index:100; border-bottom:1px solid var(--border); backdrop-filter:blur(24px) saturate(1.5); background:rgba(255,255,255,.85); }
.nav-w { max-width:1300px; margin:0 auto; padding:0 40px; height:64px; display:flex; align-items:center; justify-content:space-between; }
.logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
.logo-wm { font-family:var(--mono); font-size:1.45rem; font-weight:500; letter-spacing:-1px; color:var(--text); }
.logo-wm b { color:var(--g1); }
.logo-chip { font-family:var(--mono); font-size:.6rem; font-weight:700; color:var(--g1); background:rgba(0,181,120,.1); border:1px solid rgba(0,181,120,.2); padding:3px 8px; border-radius:20px; letter-spacing:1px; text-transform:uppercase; }
.nav-btn { font-family:var(--sans); font-weight:700; font-size:.875rem; color:#ffffff; background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 100%); border:none; padding:10px 26px; border-radius:10px; cursor:pointer; transition:all .3s; }
main { display:grid; grid-template-columns:1fr 480px; max-width:1300px; margin:0 auto; padding:48px 40px 64px; align-items:center; width:100%; gap: 40px; }
.hero-title { font-size:clamp(3rem,5.5vw,5.2rem); font-weight:900; line-height:1.06; margin-bottom:22px; color: var(--text); }
.accent { background:linear-gradient(120deg,var(--g1) 0%,var(--g2) 50%,var(--g1) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.auth-card { position:relative; background:var(--card); backdrop-filter:blur(40px); border:1px solid var(--border); border-radius:24px; padding:32px 32px 26px; box-shadow:0 30px 60px rgba(0,0,0,0.06); }
.tabs { display:flex; gap:4px; background:rgba(0,0,0,.04); border:1px solid var(--border); border-radius:12px; padding:4px; margin-bottom:20px; }
.tab { flex:1; padding:10px; border:none; border-radius:9px; font-family:var(--sans); font-weight:700; cursor:pointer; color:var(--muted); transition:all .25s; }
.tab.on { background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 100%); color:#ffffff; }
.inp { width:100%; background:rgba(0,0,0,.02); border:1px solid rgba(0,0,0,.1); padding:12px 14px; border-radius:10px; font-family:var(--sans); margin-bottom: 10px; }
.cta-btn { width:100%; background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 100%); color:#ffffff; border:none; padding:14px; border-radius:12px; font-weight:900; cursor:pointer; }
.hidden { display:none !important; }
footer { border-top:1px solid var(--border); padding:18px 40px; text-align: center; }
</style>
</head>
<body>
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<canvas id="cvs"></canvas>

<div class="page">
<nav>
    <div class="nav-w">
        <a class="logo" href="#">
            <span class="logo-wm">Math<b>Pro</b></span>
            <span class="logo-chip">LIVE</span>
        </a>
        <button class="nav-btn">دخول المنصة ←</button>
    </div>
</nav>

<main>
    <div class="hero">
        <h1 class="hero-title">تعلّم الرياضيات <span class="accent">بطريقة مختلفة</span></h1>
        <p style="color:var(--text2); margin-bottom:30px;">منصة الأستاذ شريف علي — شرح احترافي يتابع تقدمك خطوة بخطوة.</p>
    </div>

    <div class="card-col">
        <div class="auth-card" id="authCard">
            <div class="tabs">
                <button class="tab on" id="loginTab">دخول</button>
                <button class="tab" id="signupTab">حساب جديد</button>
            </div>

            <div id="extraFields" class="hidden">
                <input id="userName" class="inp" placeholder="الاسم الرباعي...">
                <select id="userGrade" class="inp">
                    <option value="" disabled selected>اختر الصف...</option>
                    <option value="1">الصف الأول الثانوي</option>
                    <option value="2">الصف الثاني الثانوي</option>
                    <option value="3">الصف الثالث الثانوي</option>
                </select>
                <input id="userPhone" class="inp" placeholder="رقم الطالب">
                <input id="parentPhone" class="inp" placeholder="رقم ولي الأمر">
            </div>

            <input id="email" type="email" class="inp" placeholder="البريد الإلكتروني">
            <input id="password" type="password" class="inp" placeholder="كلمة المرور">

            <button class="cta-btn" id="actionBtn">دخول ←</button>
            <p id="msg" style="color:red; font-size:0.8rem; margin-top:10px; text-align:center;"></p>
        </div>
    </div>
</main>

<footer>
    <span style="font-size:0.8rem; color:var(--muted);">MathPro © 2026 | Developed by Kevin</span>
</footer>
</div>

<script>
/* --- أنيميشن الماوس والنقط (شغالة زي ما هي) --- */
const dot=document.getElementById('cur-dot'), ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
(function ar(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(ar);})();

const c=document.getElementById('cvs'),cx=c.getContext('2d');
let W,H,pts=[];
function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
resize(); window.addEventListener('resize',resize);
class P{
    constructor(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.4;this.vy=(Math.random()-.5)*.4;this.r=Math.random()*1.5+.5;}
    update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W)this.vx*=-1;if(this.y<0||this.y>H)this.vy*=-1;}
    draw(){cx.beginPath();cx.arc(this.x,this.y,this.r,0,Math.PI*2);cx.fillStyle='rgba(0,181,120,.4)';cx.fill();}
}
for(let i=0;i<60;i++)pts.push(new P());
(function anim(){
    cx.clearRect(0,0,W,H);
    pts.forEach(p=>{p.update();p.draw();});
    requestAnimationFrame(anim);
})();

/* --- المنطق الجديد للربط مع أوراكل --- */
const API_URL = "http://localhost:3000/api";

// دالة لتوليد ID فريد للجهاز
function getDeviceId() {
    let id = localStorage.getItem('device_id');
    if (!id) {
        id = 'dev_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('device_id', id);
    }
    return id;
}

let mode = "login";
const lTab = document.getElementById("loginTab");
const sTab = document.getElementById("signupTab");
const extra = document.getElementById("extraFields");
const btn = document.getElementById("actionBtn");
const msg = document.getElementById("msg");

sTab.onclick = () => { mode="signup"; extra.classList.remove("hidden"); btn.textContent="إنشاء حساب جديد ←"; sTab.classList.add("on"); lTab.classList.remove("on"); };
lTab.onclick = () => { mode="login"; extra.classList.add("hidden"); btn.textContent="دخول ←"; lTab.classList.add("on"); sTab.classList.remove("on"); };

btn.onclick = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const deviceId = getDeviceId();
    msg.innerText = "";

    if(!email || !password) return msg.innerText = "أدخل البيانات أولاً";

    try {
        if (mode === "signup") {
            const name = document.getElementById("userName").value;
            const grade = document.getElementById("userGrade").value;
            const phone = document.getElementById("userPhone").value;
            const parent = document.getElementById("parentPhone").value;

            btn.innerText = "جاري الحفظ...";
            const res = await fetch(`${API_URL}/auth/signup`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, email, password, grade, phone, parentphone: parent, deviceId })
            });
            const data = await res.json();
            if(data.success) {
                alert("تم إنشاء الحساب بنجاح! كودك هو: " + data.user.studentid);
                location.reload();
            } else { msg.innerText = data.message; }

        } else {
            btn.innerText = "جاري الدخول...";
            const res = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password, deviceId })
            });
            const data = await res.json();
            if(data.success) {
                alert("أهلاً بك يا " + data.user.name);
                // هنا ممكن تنقله لصفحة الدروس
            } else { msg.innerText = data.message; }
        }
    } catch(e) {
        msg.innerText = "السيرفر غير متصل. تأكد من تشغيل node server.js";
    } finally {
        btn.innerText = mode === "login" ? "دخول ←" : "إنشاء حساب جديد ←";
    }
};
</script>
</body>
</html>
